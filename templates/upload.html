{% extends 'base.html' %}  
{% load static %}

{% block title %}Загрузка видео{% endblock %}

{% block content %}
<section class="page">
  <div class="card stack-lg">
    <h2>Загрузка видео</h2>
    <p class="lead">Добавьте новые видео в вашу коллекцию</p>

    <!-- Форма загрузки -->
    <div class="upload-section active">
      <form method="POST" enctype="multipart/form-data" class="upload-form">
        {% csrf_token %}
        <div class="form-group">
          <label for="video">Выберите видео:</label>
          <input type="file" class="btn" name="video" id="video" accept="video/*" required>
          <small class="form-hint">Поддерживаются: MP4, WebM, MOV. Максимум 500MB на файл.</small>
        </div>
        
        <div class="form-group">
          <label for="title">Название:</label>
          <input type="text" name="title" id="title" class="form-input" placeholder="Название видео">
        </div>
        
        <div class="form-group">
          <label for="description">Описание:</label>
          <textarea name="description" id="description" class="form-textarea" placeholder="Описание видео"></textarea>
        </div>
        
        <div class="form-group">
          <label for="duration">Длительность (опционально):</label>
          <input type="text" name="duration" id="duration" class="form-input" placeholder="Например: 3:45">
        </div>
        
        <button type="submit" class="btn">Загрузить</button>
      </form>
    </div>

    <div class="btn-row">
      <a class="btn" href="{% url 'conclusion' %}">Содержание</a>
      <a class="btn secondary" href="{% url 'gallery' %}">В галерею</a>
    </div>
  </div>
</section>
{% endblock %}
