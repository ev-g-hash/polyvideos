{% extends 'base.html' %}
{% load static %}

{% block title %}Админ Панель | Poly Videos{% endblock %}

{% block content %}
<div class="admin-container">
    <div class="admin-header">
        <a href="{% url 'index' %}" class="back-btn">
            ← Назад на главную
        </a>
        <h1 class="page-title">Админ Панель</h1>
        <p class="page-description">Вход в административную панель для управления видео контентом</p>
    </div>

    <form class="login-form" id="loginForm" method="post">
        {% csrf_token %}
        <div class="form-group">
            <label class="form-label" for="username">Логин</label>
            <input 
                type="text" 
                id="username" 
                name="username"
                class="form-input" 
                placeholder="Введите логин"
                required
            >
        </div>
        
        <div class="form-group">
            <label class="form-label" for="password">Пароль</label>
            <input 
                type="password" 
                id="password" 
                name="password"
                class="form-input" 
                placeholder="Введите пароль"
                required
            >
        </div>
        
        <button type="submit" class="btn-login">
            <svg fill="currentColor" height="20" viewbox="0 0 24 24" width="20" style="margin-right: 8px;">
                <path d="M12,1L3,5V11C3,16.55 6.84,21.74 12,23C17.16,21.74 21,16.55 21,11V5L12,1M12,7C13.4,7 14.8,8.6 14.8,10V11H15.5C16.4,11 17,11.4 17,12V16C17,16.6 16.6,17 16,17H8C7.4,17 7,16.6 7,16V12C7,11.4 7.4,11 8,11H8.5V10C8.5,8.6 9.9,7 12,7M12,8.2C11.2,8.2 10.5,8.7 10.5,10V11H13.5V10C13.5,8.7 12.8,8.2 12,8.2Z"/>
            </svg>
            Войти в панель
        </button>
    </form>

    <div style="text-align: center; margin-top: 30px; color: var(--text-muted); font-size: 0.9rem;">
        <p>🎭 <strong>Демо данные:</strong></p>
        <p>Логин: <code style="background: rgba(255,255,255,0.1); padding: 2px 6px; border-radius: 4px;">admin</code></p>
        <p>Пароль: <code style="background: rgba(255,255,255,0.1); padding: 2px 6px; border-radius: 4px;">admin123</code></p>
    </div>
</div>
{% endblock %}
